<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenada Pub & Burger - PDV</title>
    <link rel="icon" type="image/png" href="./hamburger.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="logo-container">
             <a href="index.html">
             <img src="./icon-192.png" alt="Ícone de hambúrguer">
        </a>
            <h1>.:SERENADA PUB & BURGER:.</h1>
            <a href="estoque.html" class="btn-warning">⚙️ Estoque</a>
        </header>

        <div class="section">
            <h3>🔥 Lançar Pedido</h3>
            <div class="pedido-topo">
                <select id="mesaSelect" onchange="toggleCliente()"></select>
                <div id="painelDelivery">
                    <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
                    <input type="text" id="endCliente" placeholder="Endereço Completo">
                    <input type="number" id="taxaEntrega" placeholder="Taxa R$" min="0" step="0.50">
                </div>
            </div>

            <div class="pedido-produto">
                <select id="produtoSelect"></select>
                <input type="number" id="qtdItem" value="1" min="1">
                <input type="text" id="obsItem" placeholder="Observações...">
                <button class="btn-primary" onclick="adicionarItem()">Adicionar na Conta</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Local</th>
                            <th>Produto</th>
                            <th>Obs</th>
                            <th>Qtd</th>
                            <th>Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="itensMesa"></tbody>
                </table>
            </div>
            <div class="total" id="totalMesa">Total: R$ 0.00</div>
            <button class="btn-close" onclick="fecharMesa()">Finalizar e Imprimir Cupom</button>
        </div>

        <div class="section caixa-section" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3>💰 Caixa do Dia</h3>
                <div id="totalDia" style="font-size: 1.5em; color: #03dac6;">Total: R$ 0.00</div>
            </div>
            <div>
                <button class="btn-primary" onclick="gerarRelatorioExcel()">📊 Relatório Excel</button>
                <button class="btn-danger" onclick="fecharCaixa()">Encerrar Caixa</button>
            </div>
        </div>

        <div class="section">
            <h3>📜 Histórico</h3>
            <div class="historico-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data/Hora</th>
                            <th>Local</th>
                            <th>Pagto</th>
                            <th>Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaHistorico"></tbody>
                </table>
            </div>
            <button class="btn-warning" onclick="document.getElementById('inputCSV').click()">📂 Importar CSV</button>
            <input type="file" id="inputCSV" accept=".csv" style="display:none" onchange="importarCSV(event)">
           <!-- <button class="btn-gray" style="margin-top:10px" onclick="limparHistoricoVisual()">🧹 Limpar Lista</button> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
