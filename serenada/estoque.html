<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenada Pub & Burger - Estoque</title>
    <link rel="icon" type="image/png" href="assets/hamburger.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <header class="logo-container">
            <img src="assets/icon-192.png" alt="Logo">
            <title>Serenada Pub & Burger - Estoque</title>
            <a href="estoque.html" class="btn-warning">⚙️ Estoque</a>
        </header>

        <div class="section">
            <h3>📦 Cadastro de Produto</h3>
            <div class="cadastro-grid" style="display: flex; gap: 5px; flex-wrap: wrap;">
                <input id="nomeProduto" placeholder="Nome do Produto" style="flex: 2;">
                <input id="precoProduto" type="number" step="0.01" placeholder="Preço" style="flex: 1;">
                <input id="estoqueProduto" type="number" placeholder="Qtd Inicial" style="flex: 1;">
                <button class="btn-primary" onclick="cadastrarProduto()" style="flex: 1;">Cadastrar</button>
            </div>
        </div>

        <div class="section">
            <h3>📋 Produtos Cadastrados</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEstoque"></tbody>
                </table>
            </div>
        </div>

        <div class="section" style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-warning" onclick="document.getElementById('inputCSV').click()">📂 Importar CSV</button>
            <input type="file" id="inputCSV" accept=".csv" style="display:none" onchange="importarCSV(event)">
            <button class="btn-danger" onclick="zerarSistema()">⚠️ Zerar Sistema</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
