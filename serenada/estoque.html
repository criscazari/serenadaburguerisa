<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenada Pub & Burger - Estoque</title>
    <link rel="icon" type="image/png" href="hamburger.png" > 
</a>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="logo-container">
            <a href="index.html">
             <img src="./icon-192.png" alt="Ícone de hambúrguer">
        </a>
            <h1>⚙️ Gerenciamento de Estoque</h1>
            <a href="index.html" class="btn-gray">⬅️ Voltar ao PDV </a>
        </header>

        <div class="section">
            <h3>📦 Cadastro de Produto</h3>
            <div class="cadastro-grid" style="display: flex; gap: 5px; flex-wrap: wrap;">
                <input id="nomeProduto" placeholder="Nome do Produto" style="flex: 2;">
                <input id="precoProduto" type="number" step="0.01" placeholder="Preço" style="flex: 1;">
                <input id="estoqueProduto" type="number" placeholder="Qtd Inicial" style="flex: 1;">
                <button class="btn-primary" onclick="cadastrarProduto()" style="flex: 1;">Cadastrar</button>
            </div>
        </div>

        <div class="section">
            <h3>📋 Produtos Cadastrados</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEstoque"></tbody>
                </table>
            </div>
        </div>

        <div class="section" style="display: flex; gap: 10px; justify-content: center;">
            <input type="file" accept=".csv" onchange="importarCSVEstoque(event)">
            <button class="btn-primary" onclick="exportarEstoque()">📥 Exportar Estoque</button>
            <button class="btn-danger" onclick="zerarSistema()">⚠️ Zerar Sistema</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
