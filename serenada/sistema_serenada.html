<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenada Pub & Burger - Sistema</title>
<link rel="icon" type="image/png" href="hamburger.png">

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background:#121212;
    color:#fff;
    font-size: 14px; /* Base ligeiramente menor */
}

.container{
    max-width:1100px;
    margin:10px auto;
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.logo-container {
    display: grid;
    grid-template-columns: 80px 1fr 80px; 
    align-items: center;
    margin-bottom: 15px;
}

.logo-container img { width: 60px; grid-column: 1; }

.logo-container h1 {
    grid-column: 2;
    text-align: center;
    margin: 0;
    color: #03dac6;
    font-size: 1.2rem;
    letter-spacing: 1px;
}

.section{
    margin-top:15px;
    padding:12px;
    background:#2a2a2a;
    border-radius:10px;
}

h3 { 
    font-size: 1rem; 
    margin: 0 0 10px 0; 
    color: #03dac6;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, select{
    padding:8px;
    margin:4px 0;
    border-radius: 4px;
    border: 1px solid #444;
    background: #333;
    color: #fff;
    outline: none;
    font-size: 0.9rem;
    box-sizing: border-box;
}

button{
    padding:10px;
    margin:4px 0;
    cursor:pointer;
    border:none;
    border-radius:6px;
    font-weight: bold;
    font-size: 0.9rem;
    transition: 0.2s;
    width: 100%;
}

.btn-inline { width: auto; margin: 2px; }

/* BOTÕES DE QUANTIDADE MINI */
.btn-qty {
    width: 24px;
    height: 24px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #444;
    color: #03dac6;
    border-radius: 4px;
    font-size: 12px;
}

.qty-display {
    display: inline-block;
    min-width: 25px;
    text-align: center;
    font-weight: bold;
    font-size: 0.9rem;
}

.btn-primary{ background:#03dac6; color: #000; }
.btn-danger{ background:#ff5252; color:#fff; }
.btn-close{ background:#ff4081; color:#fff; }

.table-responsive {
    width: 100%;
    overflow-x: auto;
    margin-top: 10px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width: 450px; /* Reduzido para acomodar telas menores */
}

th, td{
    border-bottom:1px solid #444;
    padding:8px 4px;
    text-align:center;
    font-size: 0.85rem;
}

th { background: #333; color: #03dac6; font-weight: 600; }

.total{
    font-weight:bold;
    margin-top:10px;
    font-size: 1.2em;
    color: #03dac6;
    text-align: right;
}

#painelDelivery { 
    display: none; 
    flex-direction: column;
    border-left: 3px solid #03dac6;
    padding-left: 8px;
    margin: 8px 0;
}

@media (max-width: 768px) {
    .logo-container { grid-template-columns: 1fr; justify-items: center; }
    .logo-container div:last-child { display: none; }
    .logo-container h1 { font-size: 1.1rem; }
    
    /* Layout de cadastro em grade no mobile */
    .cadastro-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
    }
    .cadastro-grid input#nomeProduto { grid-column: span 2; }
    
    .section button { width: 100%; }
    .container { margin: 0; border-radius: 0; padding: 10px; }
    
    th, td { padding: 6px 2px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999; padding: 20px; box-sizing: border-box;">
    <h2 style="color:#03dac6; text-align: center;">🍔 Serenada Pub - Acesso</h2>
    <input type="password" id="senhaLogin" placeholder="Senha" onkeydown="if(event.key === 'Enter'){ fazerLogin();}" style="text-align:center; width: 100%; max-width: 250px;">
    <button class="btn-primary" onclick="fazerLogin()" style="max-width: 250px;">Entrar</button>
</div>

<div class="container">
    <header class="logo-container">
        <img src="icon-192.png" alt="Logo">
        <h1>.:SERENADA PUB & BURGER:.</h1>
        <div style="width: 80px;"></div>
    </header>

    <div class="section">
        <h3>📦 Estoque</h3>
        <div class="cadastro-grid" style="display: flex; flex-wrap: wrap; gap: 4px;">
            <input id="nomeProduto" placeholder="Produto" style="flex: 2; min-width: 140px;">
            <input id="precoProduto" type="number" step="0.01" placeholder="R$" style="flex: 1; min-width: 60px;">
            <input id="estoqueProduto" type="number" placeholder="Qtd" style="flex: 1; min-width: 50px;">
            <button class="btn-primary" style="flex: 1; min-width: 100px; padding: 8px;" onclick="cadastrarProduto()">Salvar</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Item</th>
                        <th>Preço</th>
                        <th>Qtd</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaEstoque"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h3>🔥 Pedido</h3>
        <select id="mesaSelect" onchange="toggleCliente()" style="width: 100%;"></select>
        <div id="painelDelivery">
            <input type="text" id="nomeCliente" placeholder="Cliente">
            <input type="text" id="endCliente" placeholder="Endereço">
            <input type="number" id="taxaEntrega" placeholder="Taxa R$">
        </div>

        <div style="margin-top:8px; display: grid; grid-template-columns: 2fr 1fr; gap: 4px;">
            <select id="produtoSelect"></select>
            <input type="number" id="qtdItem" value="1" min="1">
            <input type="text" id="obsItem" placeholder="Observações..." style="grid-column: span 2;">
            <button class="btn-primary" onclick="adicionarItem()" style="grid-column: span 2;">Adicionar</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Local</th>
                        <th>Item</th>
                        <th>Qtd</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="itensMesa"></tbody>
            </table>
        </div>
        <div class="total" id="totalMesa">Total: R$ 0.00</div>
        <button class="btn-close" onclick="fecharMesa()">Fechar Comanda</button>
    </div>

    <div class="section">
        <h3>💰 Caixa</h3>
        <div id="totalDia" style="font-size: 1.5em; color: #03dac6; margin-bottom: 10px;">R$ 0.00</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="btn-primary" onclick="gerarRelatorioCompleto()">Relatório</button>
            <button class="btn-danger" onclick="fecharCaixa()">Encerrar</button>
        </div>
    </div>

    <div class="section">
        <h3>📜 Histórico</h3>
        <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Local</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tabelaHistorico"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
/* LÓGICA MANTIDA E OTIMIZADA */
const SENHA_SISTEMA = "1234"; 
let estoque = JSON.parse(localStorage.getItem("estoque")) || [];
let comandas = JSON.parse(localStorage.getItem("comandas")) || {};
let totalDia = JSON.parse(localStorage.getItem("totalDia")) || 0;
let historico = JSON.parse(localStorage.getItem("historico")) || [];

function fazerLogin(){
    if(document.getElementById("senhaLogin").value === SENHA_SISTEMA) {
        document.getElementById("loginScreen").style.display="none";
    } else alert("Senha incorreta!");
}
function salvarDados(){
    localStorage.setItem("estoque", JSON.stringify(estoque));
    localStorage.setItem("comandas", JSON.stringify(comandas));
    localStorage.setItem("totalDia", JSON.stringify(totalDia));
    localStorage.setItem("historico", JSON.stringify(historico));
}
function toggleCliente() {
    let mesa = mesaSelect.value;
    document.getElementById("painelDelivery").style.display = (mesa === "Delivery") ? "flex" : "none";
    atualizarMesa();
}
function cadastrarProduto(){
    let nome = nomeProduto.value.trim();
    let preco = parseFloat(precoProduto.value);
    let qtd = parseInt(estoqueProduto.value);
    if(!nome || isNaN(preco)) return alert("Preencha os campos!");
    estoque.push({nome, preco, qtd});
    salvarDados(); atualizarEstoque();
    nomeProduto.value = ""; precoProduto.value = ""; estoqueProduto.value = "";
}

function atualizarEstoque(){
    tabelaEstoque.innerHTML="";
    produtoSelect.innerHTML="";
    estoque.forEach((p,i)=>{
        tabelaEstoque.innerHTML+=
        `<tr>
            <td style="text-align: left;">${p.nome}</td>
            <td>R$ ${p.preco.toFixed(2)}</td>
            <td style="white-space: nowrap;">
                <button class="btn-qty" onclick="alterarEstoque(${i}, -1)">-</button>
                <span class="qty-display">${p.qtd}</span>
                <button class="btn-qty" onclick="alterarEstoque(${i}, 1)">+</button>
            </td>
            <td><button class="btn-danger" style="width: 30px; padding: 4px;" onclick="excluirProduto(${i})">🗑️</button></td>
        </tr>`;
        produtoSelect.innerHTML+= `<option value="${i}">${p.nome}</option>`;
    });
}

function alterarEstoque(i, n){
    if(estoque[i].qtd + n < 0) return;
    estoque[i].qtd += n;
    salvarDados(); atualizarEstoque();
}
function excluirProduto(i) {
    if(confirm(`Excluir ${estoque[i].nome}?`)) {
        estoque.splice(i, 1);
        salvarDados(); atualizarEstoque();
    }
}
function atualizarMesas(){
    mesaSelect.innerHTML = `<option value="todas">Contas Abertas</option><option value="Balcão">📍 Balcão</option><option value="Delivery">🛵 Delivery</option>`;
    for(let i=1;i<=20;i++) mesaSelect.innerHTML += `<option value="${i}">Mesa ${i}</option>`;
}
function adicionarItem(){
    let mesaSel = mesaSelect.value;
    if(mesaSel==="todas") return alert("Selecione a Mesa!");
    let pIdx = produtoSelect.value;
    let qtd = parseInt(qtdItem.value);
    let produto = estoque[pIdx];
    if(!produto || qtd <= 0) return;
    if(produto.qtd < qtd) return alert("Sem estoque!");
    let idComanda = (mesaSel === "Delivery") ? `DEL: ${nomeCliente.value.trim()}` : (mesaSel === "Balcão" ? "BALCÃO" : `M${mesaSel}`);
    if(!comandas[idComanda]) {
        comandas[idComanda] = { itens: [], taxa: 0, endereco: "" };
        if(mesaSel === "Delivery") { 
            comandas[idComanda].taxa = parseFloat(taxaEntrega.value) || 0; 
            comandas[idComanda].endereco = endCliente.value.trim(); 
        }
    }
    comandas[idComanda].itens.push({ nome: produto.nome, qtd, preco: produto.preco, total: produto.preco * qtd, obs: obsItem.value.trim() });
    produto.qtd -= qtd;
    obsItem.value = ""; salvarDados(); atualizarEstoque(); atualizarMesa();
}
function atualizarMesa(){
    let mesaSel = mesaSelect.value;
    let nomeCli = nomeCliente.value.trim();
    let idBusca = (mesaSel === "Delivery") ? `DEL: ${nomeCli}` : (mesaSel === "Balcão" ? "BALCÃO" : `M${mesaSel}`);
    itensMesa.innerHTML="";
    let totalGeral=0;
    const renderLinhas = (id) => {
        let subtotal = 0;
        comandas[id].itens.forEach((item, index) => {
            subtotal += item.total;
            itensMesa.innerHTML += `<tr><td>${id}</td><td>${item.nome}</td><td>${item.qtd}</td><td>R$ ${item.total.toFixed(2)}</td>
            <td><button class="btn-danger" style="width: 25px; padding: 2px;" onclick="removerItem('${id}',${index})">×</button></td></tr>`;
        });
        if(comandas[id].taxa > 0) {
            itensMesa.innerHTML += `<tr style="color:#03dac6"><td>-</td><td>Taxa</td><td>-</td><td>R$ ${comandas[id].taxa.toFixed(2)}</td><td></td></tr>`;
            subtotal += comandas[id].taxa;
        }
        return subtotal;
    };
    if(mesaSel === "todas"){
        for(let id in comandas) totalGeral += renderLinhas(id);
    } else if(comandas[idBusca]){
        totalGeral = renderLinhas(idBusca);
    }
    totalMesa.innerHTML = "Total: R$ " + totalGeral.toFixed(2);
}
function removerItem(id, idx){
    let item = comandas[id].itens[idx];
    let p = estoque.find(p=>p.nome===item.nome);
    if(p) p.qtd += item.qtd;
    comandas[id].itens.splice(idx,1);
    if(comandas[id].itens.length===0) delete comandas[id];
    salvarDados(); atualizarEstoque(); atualizarMesa();
}
function fecharMesa(){
    let mesaSel = mesaSelect.value;
    let idBusca = (mesaSel === "Delivery") ? `DEL: ${nomeCliente.value.trim()}` : (mesaSel === "Balcão" ? "BALCÃO" : `M${mesaSel}`);
    if(!comandas[idBusca]) return alert("Selecione a conta.");
    let pag = prompt("1-Dinheiro | 2-Pix | 3-Cartão");
    let formas = {"1":"Dinheiro", "2":"Pix", "3":"Cartão"};
    if(!formas[pag]) return;
    let totalFinal = comandas[idBusca].itens.reduce((s,i)=>s+i.total,0) + (comandas[idBusca].taxa || 0);
    historico.push({ 
        id: "#" + Date.now().toString().slice(-4), data: new Date().toLocaleString(), local: idBusca, pagamento: formas[pag], 
        total: totalFinal, dadosCompletos: JSON.parse(JSON.stringify(comandas[idBusca])) 
    });
    imprimirCupom(historico[historico.length-1].id, idBusca, comandas[idBusca], totalFinal, formas[pag]);
    totalDia += totalFinal; delete comandas[idBusca];
    salvarDados(); atualizarMesa(); atualizarTotalDia(); atualizarHistoricoUI();
}
function atualizarHistoricoUI(){
    tabelaHistorico.innerHTML = "";
    [...historico].reverse().slice(0, 10).forEach((p, index) => {
        const realIdx = historico.length - 1 - index; 
        tabelaHistorico.innerHTML += `
        <tr>
            <td>${p.data.split(' ')[1]}</td><td>${p.local}</td><td>R$ ${p.total.toFixed(2)}</td>
            <td><button class="btn-qty" onclick="reimprimirHistorico(${realIdx})">🖨️</button></td>
        </tr>`;
    });
}
function reimprimirHistorico(index) {
    const p = historico[index];
    imprimirCupom(p.id, p.local, p.dadosCompletos, p.total, p.pagamento);
}
function imprimirCupom(id, local, obj, total, pag){
    let j = window.open("", "", "width=300");
    let c = `<pre style="font-size:12px">SERENADA PUB\nID: ${id}\nLOCAL: ${local}\n-----------------\n`;
    obj.itens.forEach(i => { c += `${i.qtd}x ${i.nome} R$${i.total.toFixed(2)}\n`; });
    if(obj.taxa > 0) c += `TAXA: R$ ${obj.taxa.toFixed(2)}\n`;
    c += `-----------------\nTOTAL: R$ ${total.toFixed(2)}\nPGTO: ${pag}\n</pre>`;
    j.document.write(c); j.print(); j.close();
}
function atualizarTotalDia(){
    document.getElementById("totalDia").innerHTML="Total: R$ "+totalDia.toFixed(2);
}
function fecharCaixa(){
    if(confirm("Encerrar dia?")) {
        totalDia = 0; historico = []; salvarDados(); location.reload();
    }
}
function gerarRelatorioCompleto(){ 
    alert(`Faturamento: R$ ${totalDia.toFixed(2)}\nPedidos: ${historico.length}`);
}

atualizarEstoque(); atualizarMesas(); atualizarTotalDia(); atualizarHistoricoUI();
</script>
</body>
</html>
