<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenada Pub & Burger - Sistema</title>
<link rel="icon" type="image/png" href="hamburger.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌗 Alternar Tema</button>

<div class="container">

<div class="logo-container">
    <img src="hamburger.png">
    <h1>Serenada Pub & Burger 🍔</h1>
</div>

<div class="section">
    <h2>📦 Adicionar Produto</h2>
    <input type="text" id="nomeProduto" placeholder="Nome do produto">
    <input type="number" id="precoProduto" placeholder="Preço">
    <button class="btn-primary" onclick="adicionarProduto()">Adicionar</button>
</div>

<div class="section">
    <h2>🧾 Produtos</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaProdutos"></tbody>
        </table>
    </div>
</div>

<div class="section">
    <h2>💰 Total</h2>
    <div class="total" id="valorTotal">R$ 0.00</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
